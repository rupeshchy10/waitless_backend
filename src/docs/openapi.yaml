openapi: 3.0.0

info:
    title: WaitLess API
    version: 1.0.0
    description: |
        WaitLess is a Queue Management System REST API that lets users to join virtual queues, track their position in real time, receive notifications and lets staff/admin manage service centers and queues.


        ## Features
        - JWT Cookie Authentication
        - Role-Based Access Control (Admin, Staff & User), including admin-controlled STAFF/ADMIN account creation
        - Queue Management (join, check-in, call next, priority, stats), with automatic closing-time expiry via a scheduled job
        - Service Center Management, including weekly off-days and a counter-capped limit on assigned staff
        - Staff assignment to service centers
        - Notification System
        - Forgot/reset password via emailed OTP
        - Cloudinary-backed image uploads for profile pictures and service center logos
        - Nepal time formatted timestamps

        ## Technology Stack
        - Node.js
        - Express.js
        - PostgreSQL
        - Prisma ORM

        ## Authentication
        WaitLess uses a JWT stored inside an **HttpOnly Cookie** for authentication.

        After a successful login, the server automatically sets a secure `jwt` cookie. All subsequent authenticated requests automatically include this cookie, so there is no need to manually send an Authorization header.

        ## Response Format
        Every response (success or error) follows the same envelope: `success`, `statusCode`, `message` and `data` (or `errors` on failure).

    contact:
        name: Rupesh Choudhary
        email: rupevilary1010@gmail.com

